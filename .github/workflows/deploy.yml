# =============================================================================
# 🐳 Remote Build & Deploy (Rust + Docker Compose)
# 描述: 远程服务器构建 Rust 二进制 + Docker 镜像部署流程
# 触发: Tag 推送 (v*) 或 手动触发 (workflow_dispatch)
# 作者: Qiqianily
# =============================================================================

name: 🐳 Remote Build & Deploy

on:
  push:
    tags:
      - 'v*' # 自动触发: v1.0.0, v2.3.1 等语义化版本
  workflow_dispatch:
    # 手动触发: GitHub UI 按钮
    inputs:
      version:
        description: '🏷️ 部署版本 (例如 1.0.0，留空则使用 latest)'
        required: false
        default: 'latest'
        type: string
      skip_tests:
        description: '⏭️  跳过测试 (加速部署，生产环境建议关闭)'
        type: boolean
        required: false
        default: true

# ── 🌍 全局环境变量 ─────────────────────────────────────────────────────
env:
  # 📦 项目标识
  PROJECT_NAME: 'shanghanlun'
  BINARY_NAME: 'shanghanlun'
  TCM_IMAGE_NAME: 'shanghanlun'

  # 🗂️ 远程路径配置（不再使用自定义 CARGO_CACHE_DIR，Rust 将使用默认 ~/.cargo）
  REMOTE_SOURCE_DIR: '/dockers/medicine/backend/shanghanlun'
  REMOTE_BUILD_DIR: '/dockers/medicine/backend/shanghanlun/build'

  # ⚙️ 构建配置
  RUST_TARGET: 'x86_64-unknown-linux-musl' # 静态编译目标
  DOCKER_COMPOSE_FILE: 'docker-compose.yml'
  ENV_FILE: '.env_prod'
  CONFIG_FILE: 'prod.yml'

  # 🔗 仓库信息
  REPO_URL: 'https://github.com/Qiqianily/shanghanlun-v2.git'

# ── 🔄 Jobs 定义 ───────────────────────────────────────────────────────
jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ═══════════════════════════════════════════════════════════════
      # 🔹 步骤 1: 🏷️ 提取并标准化版本号
      # ═══════════════════════════════════════════════════════════════
      - name: 🏷️ Extract version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" && "${{ github.event.inputs.version }}" != "latest" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v([0-9]+\.[0-9]+(\.[0-9]+)*) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ 确定部署版本: $VERSION (来源: ${{ github.event_name }})"

      # ═══════════════════════════════════════════════════════════════
      # 🔹 步骤 2: 🔐 配置 SSH 安全连接
      # ═══════════════════════════════════════════════════════════════
      - name: 🔑 Install SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🛡️ Configure SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [[ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]]; then
            echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
            echo "✅ 使用预配置的 known_hosts"
          else
            ssh-keyscan -H ${{ secrets.SSH_HOST }} 2>/dev/null >> ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
            echo "⚠️ 已动态获取 host key，建议后续配置 SSH_KNOWN_HOSTS 增强安全"
          fi

      # ═══════════════════════════════════════════════════════════════
      # 🔹 步骤 3: 🏗️ 远程构建 + 部署（使用默认 Rust 环境）
      # ═══════════════════════════════════════════════════════════════
      - name: 🏗️ Remote Build & Deploy
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          VERSION: ${{ steps.version.outputs.version }}
          SKIP_TESTS: ${{ github.event.inputs.skip_tests || 'false' }}
          REMOTE_SOURCE_DIR: ${{ env.REMOTE_SOURCE_DIR }}
          REMOTE_BUILD_DIR: ${{ env.REMOTE_BUILD_DIR }}
          TCM_IMAGE_NAME: ${{ env.TCM_IMAGE_NAME }}
          BINARY_NAME: ${{ env.BINARY_NAME }}
          ENV_FILE: ${{ env.ENV_FILE }}
          CONFIG_FILE: ${{ env.CONFIG_FILE }}
          DOCKER_COMPOSE_FILE: ${{ env.DOCKER_COMPOSE_FILE }}
          REPO_URL: ${{ env.REPO_URL }}
          RUST_TARGET: ${{ env.RUST_TARGET }}

        run: |
          ssh "$SSH_USER@$SSH_HOST" "env \
            VERSION=\"$VERSION\" \
            SKIP_TESTS=\"$SKIP_TESTS\" \
            REMOTE_SOURCE_DIR=\"$REMOTE_SOURCE_DIR\" \
            REMOTE_BUILD_DIR=\"$REMOTE_BUILD_DIR\" \
            TCM_IMAGE_NAME=\"$TCM_IMAGE_NAME\" \
            BINARY_NAME=\"$BINARY_NAME\" \
            ENV_FILE=\"$ENV_FILE\" \
            CONFIG_FILE=\"$CONFIG_FILE\" \
            DOCKER_COMPOSE_FILE=\"$DOCKER_COMPOSE_FILE\" \
            REPO_URL=\"$REPO_URL\" \
            RUST_TARGET=\"$RUST_TARGET\" \
            bash -se" <<'REMOTE_SCRIPT'

            # ═════════════════════════════════════════════════════════
            # 🛡️ 远程脚本：安全策略 & 辅助函数
            # ═════════════════════════════════════════════════════════
            set -eo pipefail

            # 🔍 关键变量校验（已移除 CARGO_CACHE_DIR）
            : "${REMOTE_SOURCE_DIR:?❌ REMOTE_SOURCE_DIR 未配置}"
            : "${BINARY_NAME:?❌ BINARY_NAME 未配置}"
            : "${VERSION:?❌ VERSION 未配置}"
            : "${ENV_FILE:?❌ ENV_FILE 未传递}"
            : "${DOCKER_COMPOSE_FILE:?❌ DOCKER_COMPOSE_FILE 未传递}"
            : "${TCM_IMAGE_NAME:?❌ TCM_IMAGE_NAME 未传递}"
            : "${RUST_TARGET:?❌ RUST_TARGET 未配置}"

            log() {
              echo ">>> [$(date '+%H:%M:%S')] [$(printf '%-6s' $1)] $2"
            }
            error() {
              echo "❌ [ERROR] $(date '+%H:%M:%S') $1" >&2
            }

            # ═════════════════════════════════════════════════════════
            # 🔹 阶段 1: 🚀 环境初始化（使用默认 Rust ~/.cargo）
            # ═════════════════════════════════════════════════════════
            log "INIT" "🔧 配置运行环境..."

            # 使用系统默认 Rust 安装路径（用户已手动升级到 1.95.0）
            export PATH="$HOME/.cargo/bin:$PATH"

            # 验证核心工具链
            log "INIT" "🔍 检查依赖工具..."
            for cmd in git cargo docker rustup; do
              if ! command -v "$cmd" &> /dev/null; then
                error "$cmd 未安装或不在 PATH 中"
                exit 1
              fi
            done
            log "INIT" "✅ 所有工具链验证通过"

            # 仅添加编译目标，不改变默认工具链（避免覆盖用户已升级的 1.95.0）
            log "INIT" "🦀 添加 target: $RUST_TARGET ..."
            rustup target add "$RUST_TARGET" >/dev/null 2>&1
            log "INIT" "✅ Rust 就绪: $(rustc --version)"

            # Docker Compose V2 检查
            if ! docker compose version &> /dev/null; then
              error "docker compose (V2 插件) 不可用"
              echo "💡 请执行: sudo apt install docker-compose-plugin"
              exit 1
            fi
            COMPOSE_CMD="docker compose"
            log "INIT" "✅ Docker Compose V2 就绪"

            # ═════════════════════════════════════════════════════════
            # 🔹 阶段 2: 📦 代码同步 & 版本检出
            # ═════════════════════════════════════════════════════════
            log "GIT" "📁 工作目录: $REMOTE_SOURCE_DIR"
            mkdir -p "$REMOTE_SOURCE_DIR"
            cd "$REMOTE_SOURCE_DIR"

            if [[ ! -d ".git" ]]; then
              log "GIT" "📥 首次克隆仓库..."
              git clone --quiet "$REPO_URL" .
            fi

            git fetch --tags --force --quiet
            git reset --hard HEAD --quiet

            TARGET_TAG="v$VERSION"
            if ! git rev-parse "refs/tags/$TARGET_TAG" &>/dev/null; then
              error "❌ Tag '$TARGET_TAG' 不存在！"
              echo "📋 最近 10 个可用 tags:"
              git tag -l | tail -10
              exit 1
            fi

            git checkout -B "deploy-temp-$VERSION" "$TARGET_TAG" --quiet
            log "GIT" "✓ 已切换到 $TARGET_TAG"

            # ═════════════════════════════════════════════════════════
            # 🔹 阶段 3: ⚙️ 配置文件更新
            # ═════════════════════════════════════════════════════════
            log "CONFIG" "📄 更新版本配置..."

            if [[ -f "$ENV_FILE" ]]; then
              if grep -q '^CURRENT_VERSION=' "$ENV_FILE"; then
                sed -i "s|^CURRENT_VERSION=.*|CURRENT_VERSION=$VERSION|" "$ENV_FILE"
              else
                echo "CURRENT_VERSION=$VERSION" >> "$ENV_FILE"
              fi
            else
              echo "⚠️ $ENV_FILE 不存在，创建新文件"
              echo "CURRENT_VERSION=$VERSION" > "$ENV_FILE"
              echo "TCM_IMAGE_NAME=$TCM_IMAGE_NAME" >> "$ENV_FILE"
            fi

            if [[ -f "$CONFIG_FILE" ]]; then
              sed -i "s|^version: \".*\"|version: \"$VERSION\"|" "$CONFIG_FILE"
              mkdir -p "$(dirname "$CONFIG_FILE")/../conf"
              cp "$CONFIG_FILE" "../conf/"
              log "CONFIG" "✅ 配置文件已更新"
            else
              echo "⚠️ $CONFIG_FILE 不存在，跳过配置更新"
            fi

            # ═════════════════════════════════════════════════════════
            # 🔹 阶段 4: 🔨 Rust 编译构建
            # ═════════════════════════════════════════════════════════
            log "BUILD" "🔧 开始编译 (target: $RUST_TARGET)..."
            mkdir -p "$REMOTE_BUILD_DIR"

            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_BUILD_TARGET="$RUST_TARGET"

            BUILD_CMD="cargo build --release --target $RUST_TARGET"
            if [[ "$SKIP_TESTS" != "true" ]]; then
              BUILD_CMD="cargo test --target $RUST_TARGET && $BUILD_CMD"
              log "BUILD" "🧪 模式: 运行测试 + 编译"
            else
              log "BUILD" "⏭️  模式: 跳过测试，直接编译"
            fi

            START_TIME=$(date +%s)
            cd "$REMOTE_SOURCE_DIR"
            eval "$BUILD_CMD"
            BUILD_TIME=$(( $(date +%s) - START_TIME ))

            BIN_SRC="target/$RUST_TARGET/release/$BINARY_NAME"
            BIN_DST="$REMOTE_BUILD_DIR/$BINARY_NAME-$VERSION"

            if [[ ! -f "$BIN_SRC" ]]; then
              error "❌ 编译产物不存在: $BIN_SRC"
              exit 1
            fi

            cp "$BIN_SRC" "$BIN_DST"
            chmod +x "$BIN_DST"
            log "BUILD" "✓ 编译完成 (${BUILD_TIME}s) → $BIN_DST"

            # ═════════════════════════════════════════════════════════
            # 🔹 阶段 5: 🐳 Docker 镜像构建 & 部署
            # ═════════════════════════════════════════════════════════
            log "DOCKER" "📋 准备构建上下文..."
            cp "$BIN_DST" "$REMOTE_SOURCE_DIR/$BINARY_NAME"
            chmod +x "$REMOTE_SOURCE_DIR/$BINARY_NAME"

            export CURRENT_VERSION="$VERSION"
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            log "DOCKER" "🔨 构建镜像 (Compose)..."
            $COMPOSE_CMD --env-file "$ENV_FILE" -f "$DOCKER_COMPOSE_FILE" build --progress=plain

            log "DOCKER" "🛑 停止旧服务..."
            $COMPOSE_CMD --env-file "$ENV_FILE" -f "$DOCKER_COMPOSE_FILE" down --remove-orphans --timeout 30 || true

            log "DOCKER" "🚀 启动新服务..."
            $COMPOSE_CMD --env-file "$ENV_FILE" -f "$DOCKER_COMPOSE_FILE" up -d

            # ═════════════════════════════════════════════════════════
            # 🔹 阶段 6: ❤️ 健康检查
            # ═════════════════════════════════════════════════════════
            log "HEALTH" "⏳ 等待服务就绪 (最多 30s)..."
            for i in {1..10}; do
              if $COMPOSE_CMD -f "$DOCKER_COMPOSE_FILE" ps | grep -q 'Up'; then
                log "HEALTH" "✅ 容器状态: Up"
                break
              fi
              if [[ $i -eq 10 ]]; then
                error "❌ 容器未正常启动"
                $COMPOSE_CMD logs --tail=50
                exit 1
              fi
              sleep 3
            done

            # ═════════════════════════════════════════════════════════
            # 🔹 阶段 7: 🧹 资源清理
            # ═════════════════════════════════════════════════════════
            log "CLEAN" "🗑️ 清理旧资源..."
            docker images "$BINARY_NAME" --format "{{.Tag}} {{.ID}}" | \
              grep -vE "^(latest|<none>|${VERSION}) " | \
              sort -Vr | awk '{print $2}' | tail -n +3 | \
              xargs -r docker rmi -f 2>/dev/null || true

            ls -t "$REMOTE_BUILD_DIR/${BINARY_NAME}-"* 2>/dev/null | \
              tail -n +3 | xargs -r rm -f || true

            docker image prune -f --filter "until=24h" >/dev/null 2>&1

            log "DONE" "   🎉✨ 部署成功！"
            log "DONE" "   📦 版本: $VERSION"
            log "DONE" "   ⏱️  构建耗时: ${BUILD_TIME}s"
            log "DONE" "   🐳 镜像: ${TCM_IMAGE_NAME}:${VERSION}"
            log "DONE" "   🔗 查看日志: $COMPOSE_CMD -f $DOCKER_COMPOSE_FILE logs -f"

          REMOTE_SCRIPT
        timeout-minutes: 45
      # ═══════════════════════════════════════════════════════════════
      # 🔹 步骤 4: 📢 部署通知（可选，需配置 webhook）
      # ═══════════════════════════════════════════════════════════════
      # - name: 📢 Notify Slack
      #   if: always()  # 无论成功/失败都发送
      #   uses: 8398a7/action-slack@v3
